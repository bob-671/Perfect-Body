{% extends "base.html" %}

{% block content %}
<h1>Todo List</h1>

<ul>
    {% for todo in todos %}
    <li>
        {{ todo.title }}:
        {% if todo.completed %}
            Completed
        {% else %}
            Not Completed
        {% endif %}
    </li>
    {% endfor %}
</ul>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Submit</button>
</form>

{% endblock %}
